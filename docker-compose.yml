services:
  db:
    image: postgres:15-alpine
    container_name: hardware_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hardware_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hardware_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hardware_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod 
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-validate} 

      PRIMARY_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hardware_db}
      PRIMARY_DB_USERNAME: ${POSTGRES_USER:-postgres}
      PRIMARY_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      
      SECONDARY_DB_URL: ${INFRA_MANAGER_DB_URL}
      SECONDARY_DB_USERNAME: ${INFRA_MANAGER_DB_USERNAME}
      SECONDARY_DB_PASSWORD: ${INFRA_MANAGER_DB_PASSWORD}
    networks:
      - internal
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hardware_frontend
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  proxy:
    image: nginx:alpine
    container_name: hardware_proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    ports:
      - "${HTTP_PORT:-80}:80"

  importer:
    build:
      context: ./knowledge-base/pc-part-importer
      dockerfile: Dockerfile
    container_name: hardware_importer
    profiles: 
      - cli
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hardware_db}
    volumes:
      - ./data:/app/data
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge